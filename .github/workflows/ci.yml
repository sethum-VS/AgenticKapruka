name: CI

on:
  push:
    branches: [ralph/sprint-1]
  pull_request:

jobs:
  lint-and-test:
    name: Ruff, mypy, and unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy app/ lib/ graphs/

      - name: Unit tests
        run: pytest tests/unit -q

  e2e-smoke:
    name: Playwright E2E smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: E2E smoke tests
        run: pytest tests/e2e -q

  ragas-eval:
    name: Ragas golden dataset eval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Ragas evaluation (mock MCP)
        run: python -m evals.ragas_eval --ci
