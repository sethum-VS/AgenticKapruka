{# Header currency select — hx-post updates Redis session preference. #}
<div class="flex shrink-0 items-center gap-2">
  <label for="header-currency" class="sr-only">Currency</label>
  <select
    id="header-currency"
    name="currency"
    data-testid="header-currency"
    class="rounded-lg border border-outline-variant/40 bg-canvas px-2 py-1.5 text-body-sm text-on-surface focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20"
    hx-post="/session/currency"
    hx-swap="none"
    hx-trigger="change"
    aria-label="Display currency"
  >
    {% for code in supported_currencies %}
    <option value="{{ code }}"{% if currency == code %} selected{% endif %}>{{ code }}</option>
    {% endfor %}
  </select>
</div>
