{# Alpine cart drawer — #cart-panel is the HTMX outerHTML swap target from product cards. #}
{% set cart_items = cart_items | default([]) %}
{% set cart_item_count = cart_item_count | default(0) %}
<div
  class="relative"
  data-testid="cart-drawer"
  x-data="cartDrawer({{ cart_item_count }})"
  @keydown.escape.window="open && close()"
>
  <button
    type="button"
    class="relative flex h-9 w-9 items-center justify-center rounded-lg text-commerce-ink hover:bg-commerce-parchment focus:outline-none focus-visible:ring-2 focus-visible:ring-kapruka-500/30"
    aria-label="Open shopping cart"
    :aria-expanded="open"
    data-testid="cart-icon"
    @click="openDrawer()"
  >
    <svg
      class="h-5 w-5"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
      />
    </svg>
    <span
      x-show="itemCount > 0"
      x-text="itemCount"
      class="absolute -right-1 -top-1 flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-kapruka-600 px-1 text-xs font-semibold tabular-nums text-white"
      data-testid="cart-badge"
      {% if cart_item_count > 0 %}aria-label="{{ cart_item_count }} items in cart"{% else %}aria-hidden="true"{% endif %}
    >{% if cart_item_count > 0 %}{{ cart_item_count }}{% endif %}</span>
  </button>

  <div
    x-show="open"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-40 bg-commerce-ink/40"
    data-testid="cart-backdrop"
    aria-hidden="true"
    @click="close()"
  ></div>

  <aside
    x-show="open"
    x-transition:enter="transform transition ease-out duration-300"
    x-transition:enter-start="translate-x-full"
    x-transition:enter-end="translate-x-0"
    x-transition:leave="transform transition ease-in duration-200"
    x-transition:leave-start="translate-x-0"
    x-transition:leave-end="translate-x-full"
    class="fixed inset-y-0 right-0 z-50 flex w-full max-w-sm flex-col bg-white shadow-xl"
    data-testid="cart-drawer-panel"
    role="dialog"
    aria-modal="true"
    aria-label="Shopping cart"
  >
    <div class="flex items-center justify-between border-b border-commerce-parchment px-4 py-3">
      <h2 class="text-base font-semibold text-commerce-ink">Your cart</h2>
      <button
        type="button"
        class="flex h-8 w-8 items-center justify-center rounded-lg text-commerce-muted hover:bg-commerce-parchment hover:text-commerce-ink focus:outline-none focus-visible:ring-2 focus-visible:ring-kapruka-500/30"
        aria-label="Close cart"
        data-testid="cart-close"
        @click="close()"
      >
        <span aria-hidden="true" class="text-xl leading-none">&times;</span>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto bg-white px-4 py-4">
      {% set items = cart_items %}
      {% include "checkout/cart_partial.html" %}
    </div>
  </aside>
</div>
